name: build
on: [push]
jobs:
  build:
    name: Build
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        go-version: ["1.25", "1.26"]
    steps:
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
        id: go

      - name: Check out code
        uses: actions/checkout@v6

      - name: Build
        run: go build ./...

  golangci:
    name: lint
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.7.2
          args: --timeout=10m
          working-directory: ./pkg

  test:
    name: Test
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        go-version: ["1.25", "1.26"]
    steps:
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}

      - name: Check out code
        uses: actions/checkout@v6

      - name: Test Go code
        run: go test -race -coverprofile=cover.out -covermode=atomic ./pkg/... ./internal/pkg/...

      - name: Upload coverage report to CodeCov
        uses: codecov/codecov-action@v4
        with:
          token: ${{secrets.CODECOV_TOKEN}}
          files: ./cover.out
          verbose: true

  e2e-upgrade-test:
    name: E2E Upgrade Test
    runs-on: ubuntu-22.04
    steps:
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Check out code
        uses: actions/checkout@v6

      - name: Build bifrost
        run: go build -o /tmp/bifrost ./server/bifrost

      - name: Run E2E upgrade test
        run: sudo bash ./test/e2e/upgrade_test.sh

  vuln_check:
    name: Security Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run Govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: 1.26.2
          go-package: ./...